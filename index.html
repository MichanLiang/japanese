<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>單語帖 · 日文單字學習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <!-- ============ 首頁 ============ -->
  <section class="screen active" id="screen-home">
    <div class="topbar">
      <div>
        <div class="sub">単語帖</div>
        <h1>今天背什麼？</h1>
      </div>
      <button class="icon-btn" onclick="go('settings')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      </button>
    </div>

    <div class="home-hero">
      <div class="hero-row">
        <div>
          <div class="streak-label">連續打卡</div>
          <div class="streak-num" id="streakNum">0<small>天</small></div>
        </div>
        <button class="checkin-btn" id="checkinBtn" onclick="doCheckin()">今日打卡</button>
      </div>
    </div>

    <div class="section-label"><h2>選擇級別</h2><span class="count" id="levelTotalCount"></span></div>
    <div class="level-grid" id="levelGrid"></div>

    <div class="section-label"><h2 id="unitListTitle">N5 · 單元列表</h2><span class="count" id="unitListCount"></span></div>
    <div class="unit-list" id="unitList"></div>
  </section>

  <!-- ============ 單元內單字列表 ============ -->
  <section class="screen" id="screen-wordlist">
    <div class="topbar">
      <button class="icon-btn" onclick="go('home')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <div style="text-align:center;">
        <div class="sub" id="wordlistLevel"></div>
        <h1 id="wordlistTheme" style="font-size:16px;"></h1>
      </div>
      <div style="width:38px;"></div>
    </div>
    <div id="wordlistBody"></div>
    <div class="learn-btn-wrap">
      <button class="btn-primary" onclick="startFlashcards()">開始學習這個單元</button>
    </div>
  </section>

  <!-- ============ 字卡學習 ============ -->
  <section class="screen card-screen" id="screen-flashcard">
    <div class="card-topbar">
      <button class="icon-btn" onclick="exitFlashcards()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div class="card-progress-bar"><div id="cardProgressFill" style="width:0%"></div></div>
      <div class="card-counter" id="cardCounter">1/20</div>
    </div>
    <div class="flash-wrap">
      <div class="flashcard" id="flashcardEl" onclick="flipCard()"></div>
      <div class="flash-actions">
        <button class="round-btn" id="starBtn" onclick="event.stopPropagation(); toggleSaveWord()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 17.3 6.2 21l1.6-6.6L2.5 9.9l6.7-.6L12 3l2.8 6.3 6.7.6-5.3 4.5L18 21z"/></svg>
        </button>
        <button class="round-btn big" onclick="event.stopPropagation(); speak()">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg>
        </button>
        <button class="round-btn" onclick="event.stopPropagation(); nextCard()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- ============ 測驗 ============ -->
  <section class="screen" id="screen-quiz">
    <div class="topbar">
      <button class="icon-btn" onclick="go('home')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <h1 style="font-size:16px;">單元測驗</h1>
      <div style="width:38px;"></div>
    </div>
    <div class="quiz-wrap" id="quizBody"></div>
  </section>

  <!-- ============ 我的單字本 ============ -->
  <section class="screen" id="screen-wordbook">
    <div class="topbar"><div><div class="sub">MY LIST</div><h1>我的單字本</h1></div><div style="width:38px;"></div></div>
    <div class="wordbook-filter">
      <div class="chip active" data-filter="due" onclick="setWbFilter('due')">待複習</div>
      <div class="chip" data-filter="all" onclick="setWbFilter('all')">全部收藏</div>
      <div class="chip" data-filter="mastered" onclick="setWbFilter('mastered')">已熟記</div>
    </div>
    <div id="wordbookBody"></div>
  </section>

  <!-- ============ 字典 ============ -->
  <section class="screen" id="screen-dict">
    <div class="topbar"><div><div class="sub">DICTIONARY</div><h1>字典</h1></div><div style="width:38px;"></div></div>
    <div class="search-bar">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="dictInput" placeholder="搜尋漢字、假名或中文意思…" oninput="dictSearch()">
    </div>
    <div class="dict-hint" id="dictHint">輸入關鍵字，搜尋 N1–N5 全部單字。</div>
    <div id="dictResults"></div>
  </section>

  <!-- ============ 設定 ============ -->
  <section class="screen" id="screen-settings">
    <div class="topbar"><div><div class="sub">SETTINGS</div><h1>設定</h1></div><div style="width:38px;"></div></div>

    <div class="settings-group">
      <h3>學習</h3>
      <div class="settings-row">
        <span>每日目標單字量</span>
        <select class="plain" id="dailyGoalSel" onchange="saveSettings()">
          <option value="10">10 字</option>
          <option value="20" selected>20 字</option>
          <option value="30">30 字</option>
          <option value="50">50 字</option>
        </select>
      </div>
      <div class="settings-row">
        <span>字卡顯示漢字</span>
        <div class="toggle on" id="toggleKanji" onclick="toggleSetting('showKanji', this)"></div>
      </div>
      <div class="settings-row">
        <span>自動播放語音</span>
        <div class="toggle" id="toggleAutoSpeak" onclick="toggleSetting('autoSpeak', this)"></div>
      </div>
    </div>

    <div class="settings-group">
      <h3>資料</h3>
      <div class="settings-row" style="cursor:pointer;" onclick="clearWordbook()"><span>清空單字本</span><span style="color:var(--shu);">›</span></div>
      <div class="settings-row" style="cursor:pointer;" onclick="clearAllData()"><span>重設所有學習紀錄</span><span style="color:var(--shu);">›</span></div>
    </div>

    <div class="settings-group">
      <h3>關於</h3>
      <div class="settings-row"><span>単語帖</span><span style="color:#a89c85;">v1.0</span></div>
    </div>
  </section>

  <!-- ============ 底部導覽 ============ -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-nav="home" onclick="go('home')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9.5 12 3l9 6.5V21a1 1 0 0 1-1 1h-5v-7H9v7H4a1 1 0 0 1-1-1z"/></svg>
      首頁
    </button>
    <button class="nav-item" data-nav="wordbook" onclick="go('wordbook')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4.5A2.5 2.5 0 0 1 6.5 2H20v18H6.5A2.5 2.5 0 0 0 4 22.5z"/><path d="M4 4.5v16A2.5 2.5 0 0 0 6.5 23H20"/></svg>
      我的單字本
    </button>
    <button class="nav-item" data-nav="dict" onclick="go('dict')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      字典
    </button>
    <button class="nav-item" data-nav="settings" onclick="go('settings')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
      設定
    </button>
  </nav>

  <div class="toast" id="toast"></div>
</div>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
